<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🏠 今晚吃什麼？</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; }
        .card { transition: all 0.3s; border: 1px solid #efe8e1; }
        .active-card { border-color: #dcb8a0; background-color: #fffaf7; border-width: 2px; }
    </style>
</head>
<body class="pb-28">

    <div class="max-w-lg mx-auto p-4">
        <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
            <button onclick="renderMenu('全部')" class="bg-orange-200 px-4 py-2 rounded-full text-sm font-bold">全部</button>
            <button onclick="renderMenu('雞')" class="bg-white border px-4 py-2 rounded-full text-sm">雞</button>
            <button onclick="renderMenu('牛')" class="bg-white border px-4 py-2 rounded-full text-sm">牛</button>
            <button onclick="renderMenu('豬')" class="bg-white border px-4 py-2 rounded-full text-sm">豬</button>
            <button onclick="renderMenu('海鮮')" class="bg-white border px-4 py-2 rounded-full text-sm">海鮮</button>
            <button onclick="renderMenu('羊')" class="bg-white border px-4 py-2 rounded-full text-sm">羊</button>
            <button onclick="showCountryOptions()" class="bg-white border px-4 py-2 rounded-full text-sm text-orange-700 font-bold">國家 🌍</button>
        </div>

        <div id="countryBar" class="hidden flex gap-2 mb-6 overflow-x-auto pb-2 border-b border-orange-100">
            <button onclick="renderMenu('日本')" class="bg-white border px-3 py-1 rounded-lg text-sm">🇯🇵 日本</button>
            <button onclick="renderMenu('泰國')" class="bg-white border px-3 py-1 rounded-lg text-sm">🇹🇭 泰國</button>
            <button onclick="renderMenu('韓國')" class="bg-white border px-3 py-1 rounded-lg text-sm">🇰🇷 韓國</button>
            <button onclick="renderMenu('意大利')" class="bg-white border px-3 py-1 rounded-lg text-sm">🇮🇹 意大利</button>
            <button onclick="renderMenu('西班牙')" class="bg-white border px-3 py-1 rounded-lg text-sm">🇪🇸 西班牙</button>
        </div>

        <div id="menuList" class="space-y-3"></div>
    </div>

    <script>
        const dishes = [
            { name: "日式照燒牛", category: "牛", country: "日本" },
            { name: "泰式冬陰功", category: "海鮮", country: "泰國" },
            { name: "韓式泡菜豬", category: "豬", country: "韓國" },
            { name: "意式肉醬麵", category: "豬", country: "意大利" },
            { name: "西班牙海鮮飯", category: "海鮮", country: "西班牙" }
        ];

        function showCountryOptions() {
            document.getElementById('countryBar').classList.remove('hidden');
        }

        function renderMenu(filter) {
            // 如果選了主類別，隱藏國家選項 (除非你想一直留著)
            if (filter !== '日本' && filter !== '泰國' && filter !== '韓國' && filter !== '意大利' && filter !== '西班牙') {
                document.getElementById('countryBar').classList.add('hidden');
            }

            const container = document.getElementById('menuList');
            const filtered = (filter === '全部') ? dishes : dishes.filter(d => d.category === filter || d.country === filter);
            
            container.innerHTML = filtered.map(d => `
                <div class="card p-4 rounded-2xl bg-white cursor-pointer" onclick="this.classList.toggle('active-card')">
                    <div class="font-bold text-gray-800">${d.name}</div>
                    <div class="text-xs text-gray-400">${d.country}風味</div>
                </div>
            `).join('');
        }

        renderMenu('全部');
    </script>
</body>
</html>
