<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚餐預訂系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">晚餐預訂系統 🍽️</h1>

        <label class="block mb-2 font-semibold">選擇日期：</label>
        <input type="date" id="date" class="w-full border p-2 rounded mb-4">

        <label class="block mb-2 font-semibold">選擇分類：</label>
        <select id="filterType" onchange="updateMenu()" class="w-full border p-2 rounded mb-4">
            <option value="all">顯示全部</option>
            <option value="雞">雞肉類</option>
            <option value="牛">牛肉類</option>
            <option value="豬">豬肉類</option>
            <option value="泰">泰式</option>
            <option value="日">日式</option>
        </select>

        <div id="menuContainer" class="space-y-2 mb-6">
            </div>

        <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">
            提交預訂至 WhatsApp
        </button>
    </div>

    <script>
        // 菜單資料庫
        const dishes = [
            { name: "冬瓜炆排骨", type: "豬", country: "中" },
            { name: "老少平安", type: "豬", country: "中" },
            { name: "焗三文魚", type: "魚", country: "西" },
            { name: "烔多春魚", type: "魚", country: "日" },
            { name: "大蝦意粉", type: "海鮮", country: "西" },
            { name: "泰式咖喱雞", type: "雞", country: "泰" }
        ];

        function updateMenu() {
            const filter = document.getElementById('filterType').value;
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            const filtered = (filter === 'all') ? dishes : dishes.filter(d => d.type === filter || d.country === filter);

            filtered.forEach(dish => {
                container.innerHTML += `
                    <label class="flex items-center space-x-3 p-2 border rounded hover:bg-gray-50">
                        <input type="checkbox" name="dish" value="${dish.name}" class="w-5 h-5">
                        <span>${dish.name}</span>
                    </label>
                `;
            });
        }

        function submitOrder() {
            const date = document.getElementById('date').value;
            const selected = Array.from(document.querySelectorAll('input[name="dish"]:checked')).map(cb => cb.value);
            
            if (!date) return alert("請先選擇日期！");
            if (selected.length === 0) return alert("請至少選擇一個菜式！");

            const msg = `小寶仔我想預訂 ${date} 的晚餐，菜單如下：\n${selected.join('\n')}`;
            const phone = "85263378993; // 請替換成你的真實號碼
            window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }

        // 初始化顯示
        updateMenu();
    </script>
</body>
</html>
