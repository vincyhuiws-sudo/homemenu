<!-- index.html 簡單範例 -->
<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-5">
    <h1 class="text-2xl font-bold mb-4">晚餐預訂系統</h1>
    
    <!-- 日期選擇 -->
    <label>選擇日期：</label>
    <input type="date" id="date" class="border p-2 mb-4">

    <!-- 食物類別/國家 -->
    <select id="category" class="border p-2 mb-4 block">
        <option value="雞">雞</option>
        <option value="牛">牛</option>
        <option value="泰式">泰式</option>
    </select>

    <!-- 菜式列表 (建議用 Checkbox) -->
    <div id="dishes" class="mb-4">
        <label><input type="checkbox" value="冬瓜炆排骨"> 冬瓜炆排骨</label>
        <label><input type="checkbox" value="焗三文魚"> 焗三文魚</label>
    </div>

    <button onclick="sendWhatsApp()" class="bg-green-500 text-white p-2 rounded">發送 WhatsApp</button>

    <script>
        function sendWhatsApp() {
            const date = document.getElementById('date').value;
            const msg = `我想訂 ${date} 的晚餐，想食：...`;
            const phone = "85263378993"; // 你的 WhatsApp 號碼
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
