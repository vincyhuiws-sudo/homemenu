<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>рҹҸ жғійЈҹе•Іе–өрҹҳӢ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; }
        .card { transition: all 0.2s; border: 1px solid #efe8e1; }
        .active-card { background-color: #fb923c !important; color: white !important; border-color: #ea580c !important; }
        
        /* 2. дҝ®жӯЈж—Ҙжңҹијёе…ҘжЎҶеңЁжүӢж©ҹдёҠзҡ„еӨ–и§Җ */
        #date {
            display: block;
            width: 50%;
            height: 35px;
            padding: 8px;
            border: 1.5px solid #fb923c !important; /* ж©ҷиүІйӮҠжЎҶ */
            cursor: pointer;
            border-radius: 10px;
            background-color: white !important;
            color: #374151;
            font-size: 22px; /* йҒҝе…Қ iOS ж”ҫеӨ§з•«йқў */
        }
    </style>
</head>
<body class="pb-32">

    <header class="text-center py-6">
        <h1 class="text-2xl text-orange-900 font-bold">рҹҸ  д»Ҡжҷҡй»һйӨҗ</h1>
    </header>

    <div class="max-w-md mx-auto px-4">
        <label for="date" class="block text-sm font-bold text-orange-900 mb-2">OrderйӮҠж—Ҙе•Ҡпјҡ</label>
        <input type="date" id="date" class="w-full mb-6">

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="showItems('рҹҗҘ')" class="px-4 py-2 bg-white rounded-full border shadow-sm">рҹҗҘ</button>
            <button onclick="showItems('рҹҗ®')" class="px-4 py-2 bg-white rounded-full border shadow-sm">рҹҗ®</button>
            <button onclick="showItems('рҹҗ·')" class="px-4 py-2 bg-white rounded-full border shadow-sm">рҹҗ·</button>
            <button onclick="showItems('рҹҰһ')" class="px-4 py-2 bg-white rounded-full border shadow-sm">рҹҰһ</button>
            <button onclick="showItems('рҹҘ’рҹҘҡрҹ«ҳ')" class="px-4 py-2 bg-white rounded-full border shadow-sm">рҹҘ’рҹҘҡрҹ«ҳ</button>
            <button onclick="showItems('дё»йЈҹрҹҳӢ')" class="px-4 py-2 bg-white rounded-full border shadow-sm">дё»йЈҹрҹҳӢ</button>            
            <button onclick="showItems('еңӢе®¶вӣі')" class="px-4 py-2 bg-white rounded-full border shadow-sm">еңӢе®¶вӣі</button>
            <button onclick="showItems('еҸ«еӨ–иіЈрҹҡІ')" class="px-4 py-2 bg-white rounded-full border shadow-sm">еҸ«еӨ–иіЈрҹҡІ</button>
        </div>

        <div id="itemList" class="grid grid-cols-1 gap-3"></div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] flex justify-between items-center z-50">
        <div id="cartCount" class="text-orange-900 font-bold" onclick="showCartModal()">е·ІйҒё 0 йҒ“ (рҹӣ’жҢүжӯӨдҝ®ж”№)</div>
        <button onclick="submitOrder()" class="bg-orange-500 text-white px-6 py-3 rounded-full font-bold shadow-lg">зҷјйҖҒ WhatsApp</button>
    </div>

    <div id="cartModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end justify-center">
        <div class="bg-white w-full max-w-md p-6 rounded-t-3xl max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-4 text-orange-900">е·ІйҒёиҸңе–®</h2>
            <div id="cartList" class="space-y-2 mb-6"></div>
            <button onclick="closeCart()" class="w-full py-3 bg-gray-200 rounded-full font-bold">й—ңй–үдёҰз№јзәҢй»һйӨҗ</button>
        </div>
    </div>

    <script>
        const data = {
            'рҹҗҘ': ['OMAKAйӣһ','з…§зҮ’йӣһжү’', 'и ”жІ№и–Ҝд»”зӮҶйӣһ', 'з„—йӣһиғё', 'BBQйӣһйҺҡ', 'и’ңйҰҷйӣһйҺҡ','й»‘и’ңйӣһ','йӣІеҗһйӣһ','з„—е…Ёйӣһ'],
            'рҹҗ®': ['йҰҷз…Һзүӣжқҝи…ұ', 'дёӯејҸзүӣжҹі', 'зҙ…й…’зҮүзүӣ','дә”йҰҷзүӣеұ•','зӘ©иӣӢзүӣиӮү'], 
            'рҹҗ·': ['OMAKAиұ¬','й»‘жҜӣиұ¬йһҚ', 'и’ёжҺ’йӘЁ', 'еҶ¬з“ңзӮҶжҺ’йӘЁ', 'йҺ®жұҹйӘЁ','и–Ҝд»”зҮүиӮү','и’ёиӮүйӨ…'],
            'рҹҰһ': ['з„—дёүж–Үйӯҡ','з„—еӨҡжҳҘйӯҡ', 'з„—йҜ–йӯҡ','жұҒз…®йҜ–йӯҡ','жё…и’ёйӯҡ', 'и’ңзүҮиқҰ', 'зҷҪй…’з…®йқ’еҸЈ', 'иқҰиңҶз…І', 'зҷҪзҒјиқҰ', 'зҷҪзҒјй®®йӯ·','иҹ№иӮүж„ҸзІү','еўЁйӯҡж»‘и’ёиұҶи…җ'],
            'рҹҘ’рҹҘҡрҹ«ҳ': ['и’ёж°ҙиӣӢ','з•ӘиҢ„зӮ’иӣӢ','иҖҒе°‘е№іе®ү','зҺүеӯҗзҮ’','иҢ¶зў—и’ё','еўЁйӯҡж»‘и’ёиұҶи…җ','иҠҪиҸң'],
            'дё»йЈҹрҹҳӢ': ['ж°ҙйӨғ','йӣІеҗһ', 'зӮ’зІ’зІ’','иӮүйҶ¬ж„ҸзІү','йҰҷи’ңж„ҸзІү', 'иҹ№иӮүж„ҸзІү', 'ж№Ҝйәө'],
            'еңӢе®¶вӣі': ['ж—Ҙжң¬рҹҮҜрҹҮө', 'йҹ“еңӢрҹҮ°рҹҮ·','жі°еңӢрҹҮ№рҹҮӯ','ж„ҸеӨ§еҲ©рҹҮ®рҹҮ№', 'иҘҝзҸӯзүҷрҹҮӘрҹҮё','жҢӘеЁҒрҹҮірҹҮҙ'],
            'еҸ«еӨ–иіЈрҹҡІ': ['рҹҚЈ еЈҪеҸё', 'рҹҚ• жҠ«и–©', 'жө·еҚ—йӣһрҹҗҘ', 'жүӢж’•йӣһрҹҗҘ', 'йҹ“еңӢиҸң']
        };

        let selectedDishes = [];

        function showItems(cat) {
            const container = document.getElementById('itemList');
            container.innerHTML = data[cat].map(item => `
                <div class="card p-6 bg-white rounded-2xl flex justify-between items-center cursor-pointer ${selectedDishes.includes(item) ? 'active-card' : ''}" 
                     onclick="toggleDish('${item}', this)">
                    <span class="text-lg font-bold">${item}</span>
                    <span class="text-sm opacity-70">${selectedDishes.includes(item) ? 'вң“ е·ІйҒё' : 'рҹӣ’'}</span>
                </div>
            `).join('');
        }

        function toggleDish(item, el) {
            const idx = selectedDishes.indexOf(item);
            if (idx > -1) {
                selectedDishes.splice(idx, 1);
                el.classList.remove('active-card');
                el.querySelector('span:last-child').innerText = 'рҹӣ’';
            } else {
                selectedDishes.push(item);
                el.classList.add('active-card');
                el.querySelector('span:last-child').innerText = 'вң“ е·ІйҒё';
            }
            document.getElementById('cartCount').innerText = `е·ІйҒё ${selectedDishes.length} йҒ“ (рҹӣ’жҢүжӯӨдҝ®ж”№)`;
        }

        function showCartModal() {
            const list = document.getElementById('cartList');
            list.innerHTML = selectedDishes.map(item => `
                <div class="flex justify-between items-center p-3 bg-orange-50 rounded-xl">
                    <span>${item}</span>
                    <button onclick="removeDish('${item}')" class="text-red-500 font-bold px-2">X</button>
                </div>
            `).join('');
            document.getElementById('cartModal').classList.remove('hidden');
        }

        function removeDish(item) {
            selectedDishes = selectedDishes.filter(d => d !== item);
            showCartModal();
            const currentCat = Object.keys(data).find(cat => data[cat].includes(item));
            if (currentCat) showItems(currentCat);
            document.getElementById('cartCount').innerText = `е·ІйҒё ${selectedDishes.length} йҒ“ (рҹӣ’жҢүжӯӨдҝ®ж”№)`;
        }

        function closeCart() { document.getElementById('cartModal').classList.add('hidden'); }

        function submitOrder() {
            const date = document.getElementById('date').value;
            if(!date || selectedDishes.length === 0) return alert("и«ӢжҸҖж—ҘеӯҗеҗҢиҸңејҸпјҒ");
            window.location.href = `https://wa.me/852дҪ зҡ„йӣ»и©ұ?text=${encodeURIComponent(`жҷҡйӨҗй җиЁӮ (${date}):\n${selectedDishes.join('\n')}`)}`;
        }

        // 4. з¶Ій Ғијүе…ҘжҷӮпјҢиҮӘеӢ•е°Үж—ҘжңҹеЎ«е…ҘзӮәгҖҢд»ҠеӨ©гҖҚ
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>
</html>
