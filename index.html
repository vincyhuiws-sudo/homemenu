<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>рҹҸ  жҲ‘еҖ‘зҡ„жә«йҰЁжҷҡйӨҗ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; }
        .card { transition: all 0.2s; }
        /* йҖҷжҳҜдҪ иҰҒжұӮзҡ„ Highlight йЎҸиүІ (иҲҮ WhatsApp жҢүйҲ•еҗҢиүІзі») */
        .active-card { background-color: #fb923c !important; color: white !important; border-color: #ea580c !important; }
    </style>
</head>
<body class="pb-28">

    <header class="text-center py-8">
        <h1 class="text-3xl text-orange-900 font-bold">рҹҸ  д»Ҡжҷҡй»һйӨҗ</h1>
    </header>

    <div class="max-w-lg mx-auto px-4">
        <input type="date" id="date" class="w-full p-4 mb-6 rounded-2xl border-none shadow-sm bg-white text-gray-700">

        <div class="flex flex-wrap gap-2 mb-6 pb-2">
            <button onclick="showSecondLayer('йӣһрҹҗҘ')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">йӣһрҹҗҘ</button>
            <button onclick="showSecondLayer('зүӣрҹҗ®')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">зүӣрҹҗ®</button>
            <button onclick="showSecondLayer('иұ¬рҹҗ·')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">иұ¬рҹҗ·</button>
            <button onclick="showSecondLayer('жө·й®®рҹҰһ')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">жө·й®®рҹҰһ</button>
            <button onclick="showSecondLayer('еңӢе®¶вӣі')" class="px-5 py-2 bg-white rounded-full border shadow-sm text-orange-800 font-bold">еңӢе®¶вӣі</button>
            <button onclick="showSecondLayer('еҸ«еӨ–иіЈрҹҡІ')" class="px-5 py-2 bg-white rounded-full border shadow-sm text-orange-800 font-bold">еҸ«еӨ–иіЈрҹҡІ</button>
        </div>

        <div id="secondLayer" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] flex justify-between items-center z-50">
        <div id="cartCount" class="text-gray-700 font-bold">е·ІйҒё 0 йҒ“</div>
        <button onclick="submitOrder()" class="bg-orange-400 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-orange-500">зҷјйҖҒ WhatsApp</button>
    </div>

    <script>
        const data = {
            'йӣһрҹҗҘ': ['з…§зҮ’йӣһ', 'жө·еҚ—йӣһ'],
            'зүӣрҹҗ®': ['зӮ’зүӣиӮү', 'зүӣжү’'],
            'иұ¬рҹҗ·': ['й»‘жҜӣиұ¬', 'е’•еҡ•иӮү'],
            'жө·й®®рҹҰһ': ['з„—дёүж–Үйӯҡ', 'жё…и’ёйӯҡ'],
            'еңӢе®¶вӣі': ['ж—Ҙжң¬рҹҮҜрҹҮө', 'йҹ“еңӢрҹҮ°рҹҮ·', 'жі°еңӢрҹҮ№рҹҮӯ', 'ж„ҸеӨ§еҲ©рҹҮ®рҹҮ№', 'иҘҝзҸӯзүҷрҹҮӘрҹҮё', 'жҢӘеЁҒрҹҮірҹҮҙ'],
            'еҸ«еӨ–иіЈрҹҡІ': ['рҹҚЈ', 'рҹҚ•', 'жө·еҚ—йӣһрҹҗҘ', 'жүӢж’•йӣһрҹҗҘ', 'йҹ“еңӢиҸң']
        };

        let selectedDishes = [];

        function showSecondLayer(category) {
            const container = document.getElementById('secondLayer');
            container.innerHTML = data[category].map(item => {
                const isSelected = selectedDishes.includes(item);
                return `
                    <div class="card p-5 bg-white rounded-2xl border text-center cursor-pointer ${isSelected ? 'active-card' : ''}" 
                         onclick="toggleDish('${item}', this)">
                        ${item}
                    </div>
                `;
            }).join('');
        }

        function toggleDish(item, el) {
            const index = selectedDishes.indexOf(item);
            if (index > -1) {
                // еҰӮжһңе·Із¶“йҒёдәҶпјҢй»һдёҖдёӢе°ұеҸ–ж¶ҲпјҲеҫһиіјзү©и»Ҡз§»йҷӨпјү
                selectedDishes.splice(index, 1);
                el.classList.remove('active-card');
            } else {
                // еҰӮжһңжІ’йҒёпјҢй»һдёҖдёӢе°ұеҠ е…Ҙиіјзү©и»Ҡ
                selectedDishes.push(item);
                el.classList.add('active-card');
            }
            document.getElementById('cartCount').innerText = `е·ІйҒё ${selectedDishes.length} йҒ“`;
        }

        function submitOrder() {
            const date = document.getElementById('date').value;
            if(!date || selectedDishes.length === 0) return alert("и«Ӣе…ҲйҒёж—ҘжңҹеҗҢиҸңејҸпјҒ");
            
            const phone = "852дҪ зҡ„йӣ»и©ұ"; 
            const msg = `рҹҸ  д»ҠжҷҡжҷҡйӨҗ (${date}):\n${selectedDishes.join('\n')}`;
            window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
