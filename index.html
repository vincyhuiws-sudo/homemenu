<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🏠 我們的溫馨晚餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; }
        .card { transition: all 0.3s; border: 1px solid #efe8e1; }
        .active-card { border-color: #dcb8a0; background-color: #fffaf7; border-width: 2px; }
    </style>
</head>
<body class="pb-28">

    <header class="text-center py-6">
        <h1 class="text-2xl text-orange-900 font-bold">🏠 今晚吃什麼？</h1>
    </header>

    <div class="max-w-lg mx-auto px-4">
        <input type="date" id="date" class="w-full p-3 rounded-2xl border-none shadow-sm mb-6 bg-white text-gray-700">

        <div id="filterTags" class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="renderMenu('全部')" class="bg-orange-200 px-4 py-2 rounded-full text-sm font-bold">全部</button>
            <button onclick="renderMenu('雞')" class="bg-white border px-4 py-2 rounded-full text-sm">雞肉</button>
            <button onclick="renderMenu('豬')" class="bg-white border px-4 py-2 rounded-full text-sm">豬肉</button>
            <button onclick="renderMenu('泰')" class="bg-white border px-4 py-2 rounded-full text-sm">泰式</button>
            <button onclick="renderMenu('韓')" class="bg-white border px-4 py-2 rounded-full text-sm">韓式</button>
            <button onclick="renderMenu('西')" class="bg-white border px-4 py-2 rounded-full text-sm">西式</button>
            <button onclick="renderMenu('日')" class="bg-white border px-4 py-2 rounded-full text-sm">日式</button>
        </div>

        <div id="menuList" class="space-y-3"></div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] flex justify-between items-center z-50">
        <div id="cartCount" class="text-gray-700 font-bold">已選 0 道菜</div>
        <button onclick="submitOrder()" class="bg-orange-400 text-white px-8 py-3 rounded-full font-bold shadow-lg">傳送 WhatsApp</button>
    </div>

    <script>
        const dishes = [
            { name: "冬瓜炆排骨", type: "豬", country: "中", icon: "🥘" },
            { name: "老少平安", type: "豬", country: "中", icon: "🥣" },
            { name: "泰式咖喱雞", type: "雞", country: "泰", icon: "🍛" },
            { name: "韓式泡菜炒肉", type: "豬", country: "韓", icon: "🥓" },
            { name: "焗三文魚", type: "魚", country: "西", icon: "🐟" },
            { name: "大蝦意粉", type: "魚", country: "西", icon: "🍝" },
            { name: "日式炸多春魚", type: "魚", country: "日", icon: "🐟" }
        ];

        let selectedDishes = [];

        function renderMenu(filter) {
            const list = document.getElementById('menuList');
            list.innerHTML = '';
            
            // 篩選邏輯：如果選'全部'則全顯示，否則檢查類型或國家是否匹配
            const filtered = (filter === '全部') ? dishes : dishes.filter(d => d.type === filter || d.country === filter);
            
            filtered.forEach(d => {
                const isSelected = selectedDishes.includes(d.name);
                list.innerHTML += `
                    <div class="card p-4 rounded-2xl flex items-center justify-between cursor-pointer ${isSelected ? 'active-card' : 'bg-white'}" onclick="toggleDish('${d.name}', this)">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl">${d.icon}</span>
                            <div>
                                <div class="font-bold text-gray-800">${d.name}</div>
                                <div class="text-xs text-gray-400">${d.type}系 • ${d.country}式</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function toggleDish(name, el) {
            const index = selectedDishes.indexOf(name);
            if (index > -1) {
                selectedDishes.splice(index, 1);
                el.classList.remove('active-card');
            } else {
                selectedDishes.push(name);
                el.classList.add('active-card');
            }
            document.getElementById('cartCount').innerText = `已選 ${selectedDishes.length} 道菜`;
        }

        function submitOrder() {
            const date = document.getElementById('date').value;
            if(!date || selectedDishes.length === 0) return alert("請記得選日期同想食嘅菜式呀！");
            const msg = `🏠 親愛的，我預訂了 ${date} 的晚餐：\n\n${selectedDishes.join('\n')}\n\n期待這頓飯！❤️`;
            window.location.href = `https://wa.me/85263378993?text=${encodeURIComponent(msg)}`;
        }

        // 初始化
        renderMenu('全部');
    </script>
</body>
</html>
