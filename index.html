<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🏠 我們的溫馨晚餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; }
        .card { transition: all 0.3s; }
        .active-card { background-color: #fffaf7 !important; border-color: #dcb8a0 !important; border-width: 2px; }
    </style>
</head>
<body class="pb-28">

    <header class="text-center py-8">
        <h1 class="text-3xl text-orange-900 font-bold">🏠 今晚點餐</h1>
    </header>

    <div class="max-w-lg mx-auto px-4">
        <input type="date" id="date" class="w-full p-4 mb-6 rounded-2xl border-none shadow-sm bg-white text-gray-700">

        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="showSecondLayer('雞🐥')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">雞🐥</button>
            <button onclick="showSecondLayer('牛🐮')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">牛🐮</button>
            <button onclick="showSecondLayer('豬🐷')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">豬🐷</button>
            <button onclick="showSecondLayer('海鮮🦞')" class="px-5 py-2 bg-white rounded-full border shadow-sm hover:border-orange-200">海鮮🦞</button>
            <button onclick="showSecondLayer('國家⛳')" class="px-5 py-2 bg-white rounded-full border shadow-sm text-orange-800 font-bold">國家⛳</button>
        </div>

        <div id="secondLayer" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div class="fixed bottom-0 w-full bg-white border-t p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] flex justify-between items-center z-50">
        <div id="cartCount" class="text-gray-700 font-bold">已選 0 道</div>
        <button onclick="submitOrder()" class="bg-orange-400 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-orange-500">發送 WhatsApp</button>
    </div>

    <script>
        const data = {
            '雞🐥': ['照燒雞', '海南雞'],
            '牛🐮': ['炒牛肉', '牛扒'],
            '豬🐷': ['黑毛豬', '咕嚕肉'],
            '海鮮🦞': ['焗三文魚', '清蒸魚'],
            '國家⛳': ['日本🇯🇵', '韓國🇰🇷','泰國🇹🇭','意大利🇮🇹', '西班牙🇪🇸','挪威🇳🇴']
        };

        let selectedDishes = [];

        function showSecondLayer(category) {
            const container = document.getElementById('secondLayer');
            container.innerHTML = data[category].map(item => {
                const isSelected = selectedDishes.includes(item);
                return `
                    <div class="card p-5 bg-white rounded-2xl border text-center cursor-pointer ${isSelected ? 'active-card' : ''}" 
                         onclick="toggleDish('${item}', this)">
                        ${item}
                    </div>
                `;
            }).join('');
        }

        function toggleDish(item, el) {
            const index = selectedDishes.indexOf(item);
            if (index > -1) {
                selectedDishes.splice(index, 1);
                el.classList.remove('active-card');
            } else {
                selectedDishes.push(item);
                el.classList.add('active-card');
            }
            document.getElementById('cartCount').innerText = `已選 ${selectedDishes.length} 道`;
        }

        function submitOrder() {
            const date = document.getElementById('date').value;
            if(!date || selectedDishes.length === 0) return alert("請揀日子同菜式！");
            
            // 請替換你的真實電話 (格式: 852XXXXXXXX)
            const phone = "852你的電話"; 
            const msg = `🏠 今晚晚餐 (${date}):\n${selectedDishes.join('\n')}`;
            window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
        }
    </script>
</body>
</html>
