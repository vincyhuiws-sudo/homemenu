<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🏠 我們的溫馨晚餐</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif TC', serif; background-color: #fdfaf6; }
        .card { transition: transform 0.2s; border: 1px solid #f0e6dd; }
        .card:hover { transform: translateY(-2px); border-color: #dcb8a0; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="text-center py-8">
        <h1 class="text-3xl text-orange-900 font-bold">🏠 今晚吃什麼？</h1>
        <p class="text-gray-500 mt-2">為親愛的準備的晚餐</p>
    </header>

    <div class="max-w-lg mx-auto px-4">
        <!-- 日期 -->
        <input type="date" id="date" class="w-full p-3 rounded-2xl border-none shadow-sm mb-6 bg-white text-gray-700">

        <!-- 分類標籤 -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="filterMenu('all')" class="bg-orange-200 px-4 py-1 rounded-full text-sm">全部</button>
            <button onclick="filterMenu('雞')" class="bg-white border px-4 py-1 rounded-full text-sm">雞肉</button>
            <button onclick="filterMenu('豬')" class="bg-white border px-4 py-1 rounded-full text-sm">豬肉</button>
            <button onclick="filterMenu('魚')" class="bg-white border px-4 py-1 rounded-full text-sm">海鮮</button>
        </div>

        <!-- 菜單列表 -->
        <div id="menuList" class="space-y-4"></div>
    </div>

    <!-- 底部購物車欄 (Fixed) -->
    <div class="fixed bottom-0 w-full bg-white border-t p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] flex justify-between items-center z-50">
        <div id="cartCount" class="text-gray-600">已選 0 道菜</div>
        <button onclick="submitOrder()" class="bg-orange-400 text-white px-8 py-3 rounded-full font-bold shadow-lg">確認預訂</button>
    </div>

    <script>
        const dishes = [
            { name: "冬瓜炆排骨", type: "豬", icon: "🥘" },
            { name: "老少平安", type: "豬", icon: "🥣" },
            { name: "焗三文魚", type: "魚", icon: "🐟" },
            { name: "泰式咖喱雞", type: "雞", icon: "🍗" }
        ];

        let selectedDishes = [];

        function renderMenu(filter = 'all') {
            const list = document.getElementById('menuList');
            list.innerHTML = '';
            const filtered = filter === 'all' ? dishes : dishes.filter(d => d.type === filter);
            
            filtered.forEach(d => {
                list.innerHTML += `
                    <div class="card bg-white p-4 rounded-2xl flex items-center justify-between" onclick="toggleDish('${d.name}')">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl">${d.icon}</span>
                            <span class="text-lg">${d.name}</span>
                        </div>
                        <input type="checkbox" id="check-${d.name}" class="w-5 h-5 accent-orange-400">
                    </div>
                `;
            });
        }

        function toggleDish(name) {
            const index = selectedDishes.indexOf(name);
            if (index > -1) selectedDishes.splice(index, 1);
            else selectedDishes.push(name);
            
            document.getElementById(`check-${name}`).checked = index === -1;
            document.getElementById('cartCount').innerText = `已選 ${selectedDishes.length} 道菜`;
        }

        function submitOrder() {
            const date = document.getElementById('date').value;
            if(!date || selectedDishes.length === 0) return alert("請揀日子同菜式");
            const msg = `🏠 親愛的，我訂了 ${date} 的晚餐：\n${selectedDishes.join('\n')}`;
            window.location.href = `https://wa.me/85263378993?text=${encodeURIComponent(msg)}`;
        }

        filterMenu = renderMenu;
        renderMenu();
    </script>
</body>
</html>
